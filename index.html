<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Naruto Timer</title>

  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial, sans-serif;
      margin-top: 100px;
    }

    #timer {
      font-size: 60px;
      margin-bottom: 40px;
      color: orange;
    }

    button {
      font-size: 20px;
      padding: 15px 30px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .start {
      background: green;
      color: white;
    }

    .clean {
      background: red;
      color: white;
    }
  </style>
</head>

<body>

  <h1 id="timer">00:00:00</h1>

  <button class="start" onclick="start()">Start</button>
  <button class="clean" onclick="cleanTimer()">Clean</button>

  <script>
    let seconds = 0;
    let interval = null;
    let monitor = null;

    function formatTime(sec) {
      let h = String(Math.floor(sec / 3600)).padStart(2, '0');
      let m = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
      let s = String(sec % 60).padStart(2, '0');
      return `${h}:${m}:${s}`;
    }

    function startTimer() {
      interval = setInterval(() => {
        seconds++;
        document.getElementById("timer").innerText = formatTime(seconds);
      }, 1000);
    }

    function resetTimer() {
      seconds = 0;
      document.getElementById("timer").innerText = "00:00:00";
    }

    async function start() {
      if (interval) return;

      startTimer();

      try {
        const response = await fetch("http://localhost:3000/start");
        const data = await response.text();

        console.log("Servidor:", data);

        // 🔥 Quando upload terminar → reseta cronômetro
        if (data === "uploaded" || data.includes("Upload")) {
          resetTimer();
        }

      } catch (error) {
        console.error("Erro ao conectar com o servidor:", error);
        alert("Servidor não está rodando!");
        return;
      }

      // 🔍 Monitorar se arquivo ainda existe
      monitor = setInterval(async () => {
        try {
          const res = await fetch("http://localhost:3000/status");
          const data = await res.json();

          if (!data.exists) {
            clearInterval(interval);
            clearInterval(monitor);
            interval = null;
            alert("Arquivo removido. Cronômetro parado.");
          }
        } catch (err) {
          console.error("Erro ao verificar status:", err);
        }
      }, 2000);
    }

    function cleanTimer() {
      clearInterval(interval);
      clearInterval(monitor);
      interval = null;
      seconds = 0;
      document.getElementById("timer").innerText = "00:00:00";
    }
  </script>

</body>
</html>
